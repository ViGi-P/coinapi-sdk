components:
  schemas:
    Models.IndexDefinitionSnapshotEntry:
      additionalProperties: false
      example:
        index_id: index_id
        value: 0.8008281904610115
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        index_id:
          nullable: true
          type: string
        timestamp:
          format: date-time
          type: string
        value:
          format: double
          type: number
      type: object
    Models.IndexIdentifier:
      additionalProperties: false
      description: Represents an index id
      example:
        id: id
      properties:
        id:
          description: Index ID
          nullable: true
          type: string
      type: object
    Models.IndexMultiAssetWeight:
      additionalProperties: false
      example:
        assetId: assetId
        indexId: indexId
        weight: 0.8008281904610115
      properties:
        indexId:
          nullable: true
          type: string
        assetId:
          nullable: true
          type: string
        weight:
          format: double
          type: number
      type: object
    Models.IndexTimeseriesItem:
      additionalProperties: false
      description: Represents a timeseries item with value information.
      example:
        time_period_end: 2000-01-23T04:56:07.000+00:00
        value_open: 0.8008281904610115
        time_open: 2000-01-23T04:56:07.000+00:00
        value_close: 5.962133916683182
        value_high: 6.027456183070403
        time_close: 2000-01-23T04:56:07.000+00:00
        value_low: 1.4658129805029452
        time_period_start: 2000-01-23T04:56:07.000+00:00
        value_count: 5
      properties:
        time_period_start:
          description: Gets or sets the start time of the time period.
          format: date-time
          type: string
        time_period_end:
          description: Gets or sets the end time of the time period.
          format: date-time
          type: string
        time_open:
          description: Gets or sets the time when the value opened.
          format: date-time
          nullable: true
          type: string
        time_close:
          description: Gets or sets the time when the value closed.
          format: date-time
          nullable: true
          type: string
        value_open:
          description: Gets or sets the opening value.
          format: double
          nullable: true
          type: number
        value_high:
          description: Gets or sets the highest value during the time period.
          format: double
          nullable: true
          type: number
        value_low:
          description: Gets or sets the lowest value during the time period.
          format: double
          nullable: true
          type: number
        value_close:
          description: Gets or sets the closing value.
          format: double
          nullable: true
          type: number
        value_count:
          description: Gets or sets the number of values during the time period.
          format: int64
          type: integer
      type: object
    Models.IndexValue:
      additionalProperties: false
      example:
        composition:
        - component_id: component_id
          component_value: 6.027456183070403
        - component_id: component_id
          component_value: 6.027456183070403
        value: 0.8008281904610115
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        timestamp:
          format: date-time
          type: string
        value:
          format: double
          type: number
        composition:
          items:
            $ref: "#/components/schemas/Models.IndexValueComponent"
          nullable: true
          type: array
      type: object
    Models.IndexValueComponent:
      additionalProperties: false
      example:
        component_id: component_id
        component_value: 6.027456183070403
      properties:
        component_id:
          nullable: true
          type: string
        component_value:
          format: double
          type: number
      type: object
  securitySchemes:
    APIKey:
      description: API Key is required to access the endpoints
      in: header
      name: Authorization
      type: apiKey
    JWT:
      bearerFormat: JWT
      description: "JWT Authorization header using the Bearer scheme. Example: \"\
        Bearer {token}\""
      scheme: bearer
      type: http
