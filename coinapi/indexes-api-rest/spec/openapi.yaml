  /v1/indexdef/multiasset:
    get:
      tags:
        - Indexes
      summary: Get all multi-asset weights
      responses:
        '200':
          description: successful operation
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Models.IndexMultiAssetWeight'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Models.IndexMultiAssetWeight'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Models.IndexMultiAssetWeight'
            application/x-msgpack:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Models.IndexMultiAssetWeight'
  '/v1/indexdef/multiasset/{index_id}':
    get:
      tags:
        - Indexes
      summary: Get multi-asset weights for specific index
      parameters:
        - name: index_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Models.IndexMultiAssetWeight'
