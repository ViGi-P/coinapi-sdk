components:
  schemas:
    Models.IndexDefinitionSnapshotEntry:
      type: object
      properties:
        index_id:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          format: double
      additionalProperties: false
    Models.IndexIdentifier:
      type: object
      properties:
        id:
          type: string
          description: Index ID
          nullable: true
      additionalProperties: false
      description: Represents an index id
    Models.IndexMultiAssetWeight:
      type: object
      properties:
        indexId:
          type: string
          nullable: true
        assetId:
          type: string
          nullable: true
        weight:
          type: number
          format: double
      additionalProperties: false
    Models.IndexTimeseriesItem:
      type: object
      properties:
        time_period_start:
          type: string
          description: Gets or sets the start time of the time period.
          format: date-time
        time_period_end:
          type: string
          description: Gets or sets the end time of the time period.
          format: date-time
        time_open:
          type: string
          description: Gets or sets the time when the value opened.
          format: date-time
          nullable: true
        time_close:
          type: string
          description: Gets or sets the time when the value closed.
          format: date-time
          nullable: true
        value_open:
          type: number
          description: Gets or sets the opening value.
          format: double
          nullable: true
        value_high:
          type: number
          description: Gets or sets the highest value during the time period.
          format: double
          nullable: true
        value_low:
          type: number
          description: Gets or sets the lowest value during the time period.
          format: double
          nullable: true
        value_close:
          type: number
          description: Gets or sets the closing value.
          format: double
          nullable: true
        value_count:
          type: integer
          description: Gets or sets the number of values during the time period.
          format: int64
      additionalProperties: false
      description: Represents a timeseries item with value information.
    Models.IndexValue:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          format: double
        composition:
          type: array
          items:
            $ref: '#/components/schemas/Models.IndexValueComponent'
          nullable: true
      additionalProperties: false
    Models.IndexValueComponent:
      type: object
      properties:
        component_id:
          type: string
          nullable: true
        component_value:
          type: number
          format: double
      additionalProperties: false
  securitySchemes:
    APIKey:
      type: apiKey
      description: API Key is required to access the endpoints
      name: Authorization
      in: header
    JWT:
      type: http
      description: 'JWT Authorization header using the Bearer scheme. Example: "Bearer {token}"'
      scheme: bearer
      bearerFormat: JWT
security:
  - APIKey: [ ]
  - JWT: [ ]